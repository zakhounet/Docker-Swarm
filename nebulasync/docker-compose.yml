services:
  nebulasync:
    image: ghcr.io/lovelaze/nebula-sync:latest
    networks:
      - proxy
    environment:
      - TZ=Europe/Paris
      # Master : Pi4 (.104)
      - PRIMARY=http://192.168.50.104|Oww8JANeiOoHA49H+KfvL2uPFmGaMcpuBnCtnabFy+k=
      
      # Replicas : Liste des deux managers séparés par une virgule
      - REPLICAS=http://192.168.50.62:8080|V86r0AOD99AuEdYQ56F6SnVNVKGbVL+KNtM6DnWpTI8=,http://192.168.50.61:8080|V86r0AOD99AuEdYQ56F6SnVNVKGbVL+KNtM6DnWpTI8=
      
      - PRIMARY_URL=http://192.168.50.104
      - PRIMARY_PASSWORD=Oww8JANeiOoHA49H+KfvL2uPFmGaMcpuBnCtnabFy+k=
      
      # Configuration du premier Replica (Zakh)
      - REPLICA_1_URL=http://192.168.50.62:8080
      - REPLICA_1_PASSWORD=V86r0AOD99AuEdYQ56F6SnVNVKGbVL+KNtM6DnWpTI8=
      
      # Configuration du deuxième Replica (Tom)
      - REPLICA_2_URL=http://192.168.50.61:8080
      - REPLICA_2_PASSWORD=V86r0AOD99AuEdYQ56F6SnVNVKGbVL+KNtM6DnWpTI8=
      
      - PIHOLE_V6=true
      - INSECURE_SKIP_VERIFY=true
      - CLIENT_SKIP_TLS_VERIFICATION=true
      - SYNC_INTERVAL=5
      - FULL_SYNC=false
    deploy:
      placement:
        constraints:
          - node.role == manager
          - node.hostname != docker-manager-03
      restart_policy:
        condition: any
        # Délai de 5 minutes entre chaque cycle de synchronisation
        delay: 60s 
        window: 60s

networks:
  proxy:
    external: true