http:
  middlewares:
    # --- MIDDLEWARE : REDIRECTION HTTPS DU DASHBOARD ---
    dashboard-redirect:
      redirectRegex:
        permanent: true
        regex: "^https://traefik-dashboard.test.teamfnb.com/?$"
        replacement: "https://traefik-dashboard.test.teamfnb.com/dashboard/"

    # --- MIDDLEWARE : HEADERS DE SÉCURITÉ PAR DÉFAUT ---
    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        # --- CONFIGURATION CSP (Content Security Policy) ---
        # 1. 'self' + unsafe : Assure le cadenas vert sur Chrome tout en permettant 
        #    le fonctionnement des scripts dynamiques (UniFi, Technitium, Proxmox).
        # 2. ui.com & ubnt.com : AUTORISE l'affichage des icônes officielles UniFi 
        #    et la remontée des stats depuis les serveurs Ubiquiti.
        # 3. frame-ancestors : Protection contre le Clickjacking (interdit l'encapsulation 
        #    de tes interfaces dans d'autres sites).
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.ui.com https://*.ubnt.com https://*.grafana.com https://grafana.com https://images.ctfassets.net https://secure.gravatar.com https://a-us.storyblok.com https://cdn.jsdelivr.net https://seccdn.libravatar.org; font-src 'self' data:; connect-src 'self' https://*.ui.com https://grafana.com; frame-src 'self' https://*.test.teamfnb.com http://192.168.0.45:61208; frame-ancestors 'self' https://*.test.teamfnb.com;"
        customFrameOptionsValue: "ALLOW-FROM https://*.test.teamfnb.com"
        customRequestHeaders:
          X-Forwarded-Proto: "https"
    # --- MIDDLEWARE : NVR Pour Chrome --- 
    nvr-headers:
      headers:
        customRequestHeaders:
          Origin: "https://192.168.30.100"
          Referer: "https://192.168.30.100/"
          X-Forwarded-Proto: "https"