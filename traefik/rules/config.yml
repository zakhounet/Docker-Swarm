http:
  routers:
    pihole-master:
      rule: "Host(`pihole.test.teamfnb.com`)"
      priority: 100
      entryPoints:
        - websecure
      service: pihole-pi4
      middlewares:
        - default-headers # <--- On utilise le nouveau nom ici
      tls:
        certResolver: cloudflare

  services:
    pihole-pi4:
      loadBalancer:
        servers:
          - url: "http://192.168.50.104:80"

  middlewares:
    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.ui.com https://*.ubnt.com; font-src 'self' data:; connect-src 'self' https://*.ui.com; frame-ancestors 'none';"
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https