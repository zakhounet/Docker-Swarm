version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    networks:
      - proxy
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  pve-exporter:
    # IMAGE CORRIGÉE ICI
    image: prompve/prometheus-pve-exporter:latest
    networks:
      - proxy
    # L'exportateur écoute par défaut sur le port 9221
    ports:
      - "9221:9221"
    volumes:
      - ./pve.yml:/etc/prometheus/pve.yml:ro
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  proxy:
    external: true