services:
  agent:
    image: portainer/agent:2.33.6
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - agent_network
    deploy:
      mode: global
      placement:
        constraints: [node.platform.os == linux]

  portainer:
    image: portainer/portainer-ee:2.33.6
    command: 
      -H tcp://tasks.portainer_agent:9001 --tlsskipverify
    volumes:
      #- /mnt/cephfs/docker-cluster/Docker-Swarm/portainer/data:/data
      - "/mnt/portainer-db/data:/data" # <-- Modification db outside cephfs
    networks:
      - proxy
      - agent_network
    environment:
      - TZ=Europe/Paris
      - PORTAINER_DATABASE_STRICT_MODE=false
      - HSTS=false
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.hostname == docker-manager-01
      restart_policy:
        condition: on-failure
        delay: 30s
        window: 120s
      update_config:
        parallelism: 1
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=proxy"
        - "traefik.http.routers.portainer.rule=Host(`portainer.test.teamfnb.com`)"
        - "traefik.http.routers.portainer.entrypoints=websecure"
        - "traefik.http.routers.portainer.tls=true"
        - "traefik.http.routers.portainer.tls.certresolver=cloudflare"
        - "traefik.http.services.portainer.loadbalancer.server.port=9000"
        - "traefik.http.routers.portainer.middlewares=default-headers@file"
networks:
  proxy:
    external: true
  agent_network:
    driver: overlay
    attachable: true # Permet aux conteneurs standalone de se connecter au réseau d'overlay