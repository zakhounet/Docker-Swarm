services:
  vaultwarden:
    image: vaultwarden/server:latest
    networks:
      - proxy
    volumes:
      - /mnt/cephfs/docker-cluster/Docker-Swarm/vaultwarden/data:/data
    environment:
      - TZ=Europe/Paris
      - SIGNUPS_ALLOWED=false  # Sécurité : on désactive les inscriptions une fois vos données migrées
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=proxy"
        - "traefik.http.routers.vaultwarden.rule=Host(`vault.test.teamfnb.com`)"
        - "traefik.http.routers.vaultwarden.entrypoints=websecure"
        - "traefik.http.routers.vaultwarden.tls.certresolver=cloudflare"
        - "traefik.http.routers.vaultwarden.middlewares=default-headers@file"
        - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
networks:
  proxy:
    external: true